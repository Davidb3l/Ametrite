name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Keep this ref in lockstep with rust-toolchain.toml — the action
      # overrides the file, and a floating `stable` here once let a new
      # rustfmt drift the tree and break the fmt gate.
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      # verify the web app bundles (server + frontend) without errors
      - run: bun build apps/web/server.ts --target bun --outdir /tmp/build

  bench:
    # Perf-budget gate: seed 10k issues and fail if a hot read path regresses
    # past its budget (list/search/claim <15ms, context <50ms). Release build,
    # median of many iterations to smooth CI scheduler noise.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo run --release --example bench
